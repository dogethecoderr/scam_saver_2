name: scamsaver
description: A scam detection app powered by Claude AI
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.4.9
  go_router: ^13.0.1
  dio: ^5.4.0
  google_mlkit_text_recognition: ^0.11.0
  image_picker: ^1.0.7
  flutter_sound: ^9.2.13
  path_provider: ^2.1.1
  permission_handler: ^11.0.1
  file_picker: ^6.1.1
  flutter_card_swiper: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
